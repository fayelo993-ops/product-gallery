<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Product Gallery</h1>
<button id="themeToggle">Toggle Theme</button>
</header>

<div class="gallery">

<h3>Product 1</h3>
<p>Nice product description</p>

<p class="price">$49</p>
<button>Buy Now</button>

</div>


<div class="card">
<img src="https://picsum.photos/200/150?2" alt="Product 2">

<h3>Product 2</h3>
<p>Nice product description</p>

<p class="price">$59</p>
<button>Buy Now</button>

</div>


<div class="card">
<img src="https://picsum.photos/200/150?3" alt="Product 3">

<h3>Product 3</h3>
<p>Nice product description</p>

<p class="price">$69</p>
<button>Buy Now</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
